{% extends "base.html" %}

{% block content %}
  <form class="registration" action="" method="post">
  {% csrf_token %}
  {% if form.email.errors %}
    {{ form.email.errors }}
  {% endif %}
      <p><label for="{{ form.email.id_for_label }}">Email</label></p>
      <p>{{ form.email }}</p>
      <input style="font-size: 30px" type="submit" class="btn btn-default btn-lg" value="Сброс пароля">
  </form>
{% endblock %}
